# ============================================================
# Smart Attendance System - Database Configuration
# ============================================================

# --- Database Driver ---
db.driver=com.mysql.cj.jdbc.Driver

# --- Connection URL ---
# Parameters:
#   useSSL=false             : Disable SSL for local development
#   serverTimezone=Asia/Kolkata : Set timezone to IST
#   allowPublicKeyRetrieval=true : Required for MySQL 8+
#   characterEncoding=UTF-8  : Use UTF-8 encoding
db.url=jdbc:mysql://localhost:3306/smart_attendance_db?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true&characterEncoding=UTF-8

# --- Credentials ---
db.username=root
db.password=root

# --- Connection Pool Settings ---
db.pool.initialSize=5
db.pool.maxActive=20
db.pool.maxIdle=10
db.pool.minIdle=3
db.pool.maxWaitMillis=30000

# --- Connection Validation ---
db.pool.validationQuery=SELECT 1
db.pool.testOnBorrow=true
db.pool.testOnReturn=false
db.pool.testWhileIdle=true
db.pool.timeBetweenEvictionRunsMillis=60000